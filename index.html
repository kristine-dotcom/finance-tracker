<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Complete Finance Tracker - Work Log, Invoices, Budgets, and More">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finance Tracker">
  <meta name="theme-color" content="#10b981">
  <title>Finance Tracker - Complete</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Work Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
    }
    
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      #invoice-content { display: block !important; }
    }
    
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(16, 185, 129, 0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <div class="mt-4 text-emerald-400 text-lg font-semibold">Loading Finance Tracker...</div>
  </div>
  
  <div id="root"></div>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Recharts for charts -->
  <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Main App -->
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;
    
    // Mock window.storage if not available
    if (!window.storage) {
      window.storage = {
        get: async (key) => {
          const value = localStorage.getItem(key);
          return value ? { key, value, shared: false } : null;
        },
        set: async (key, value) => {
          localStorage.setItem(key, value);
          return { key, value, shared: false };
        },
        delete: async (key) => {
          localStorage.removeItem(key);
          return { key, deleted: true, shared: false };
        },
        list: async (prefix) => {
          const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
          return { keys, prefix, shared: false };
        }
      };
    }
    
    const FinanceTracker = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [work1Entries, setWork1Entries] = useState([]);
      const [work2Entries, setWork2Entries] = useState([]);
      const [budgets, setBudgets] = useState([]);
      const [salaries, setSalaries] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [savingsGoals, setSavingsGoals] = useState([]);
      const [loading, setLoading] = useState(true);
      
      const [cutoffMonth, setCutoffMonth] = useState(() => {
        const now = new Date();
        return String(now.getFullYear()) + '-' + String(now.getMonth() + 1).padStart(2, '0');
      });
      const [cutoffPeriod, setCutoffPeriod] = useState('1');
      const [invoiceData, setInvoiceData] = useState(null);
      
      const work1Config = {
        name: 'Work 1',
        dailyRate: 1000,
        hourlyRate: 125,
        standardHours: 8
      };
      
      const work2Config = {
        name: 'Work 2',
        dailyRate: 1200,
        hourlyRate: 150,
        standardHours: 8
      };
      
      const [work1Form, setWork1Form] = useState({
        date: '', timeIn: '', timeOut: '', otHours: 0, notes: ''
      });
      
      const [work2Form, setWork2Form] = useState({
        date: '', timeIn: '', timeOut: '', otHours: 0, notes: ''
      });
      
      const [budgetForm, setBudgetForm] = useState({
        category: '', monthlyLimit: 0
      });
      
      const [expenseForm, setExpenseForm] = useState({
        amount: 0, category: '', date: '', description: ''
      });
      
      const [salaryForm, setSalaryForm] = useState({
        amount: 0, date: '', period: '', source: 'Regular', notes: ''
      });
      
      const [goalForm, setGoalForm] = useState({
        name: '', targetAmount: 0, currentAmount: 0, deadline: ''
      });
      
      useEffect(() => {
        const loadData = async () => {
          try {
            const [w1, w2, b, s, e, g] = await Promise.all([
              window.storage.get('work1Entries'),
              window.storage.get('work2Entries'),
              window.storage.get('budgets'),
              window.storage.get('salaries'),
              window.storage.get('expenses'),
              window.storage.get('savingsGoals')
            ]);
            
            if (w1 && w1.value) setWork1Entries(JSON.parse(w1.value));
            if (w2 && w2.value) setWork2Entries(JSON.parse(w2.value));
            if (b && b.value) setBudgets(JSON.parse(b.value));
            if (s && s.value) setSalaries(JSON.parse(s.value));
            if (e && e.value) setExpenses(JSON.parse(e.value));
            if (g && g.value) setSavingsGoals(JSON.parse(g.value));
          } catch (error) {
            console.log('Starting fresh');
          }
          setTimeout(() => {
            setLoading(false);
            document.getElementById('loading-screen').style.display = 'none';
          }, 800);
        };
        loadData();
      }, []);
      
      const saveData = async (type, data) => {
        try {
          await window.storage.set(type, JSON.stringify(data));
        } catch (error) {
          console.error('Save error:', error);
        }
      };
      
      const calculateHours = (timeIn, timeOut) => {
        if (!timeIn || !timeOut) return 0;
        const parts1 = timeIn.split(':');
        const parts2 = timeOut.split(':');
        const inHour = parseInt(parts1[0]);
        const inMin = parseInt(parts1[1]);
        const outHour = parseInt(parts2[0]);
        const outMin = parseInt(parts2[1]);
        const inMinutes = inHour * 60 + inMin;
        const outMinutes = outHour * 60 + outMin;
        return ((outMinutes - inMinutes) / 60).toFixed(2);
      };
      
      const addWork1Entry = async () => {
        if (!work1Form.date || !work1Form.timeIn || !work1Form.timeOut) return;
        
        const regularHours = parseFloat(calculateHours(work1Form.timeIn, work1Form.timeOut));
        const otHours = parseFloat(work1Form.otHours) || 0;
        const totalHours = regularHours + otHours;
        const regularPay = regularHours * work1Config.hourlyRate;
        const otPay = otHours * work1Config.hourlyRate * 1.5;
        const totalPay = regularPay + otPay;
        
        const newEntry = {
          ...work1Form,
          id: Date.now(),
          regularHours,
          otHours,
          totalHours,
          regularPay,
          otPay,
          totalPay
        };
        
        const updated = [...work1Entries, newEntry];
        setWork1Entries(updated);
        await saveData('work1Entries', updated);
        setWork1Form({ date: '', timeIn: '', timeOut: '', otHours: 0, notes: '' });
      };
      
      const addWork2Entry = async () => {
        if (!work2Form.date || !work2Form.timeIn || !work2Form.timeOut) return;
        
        const regularHours = parseFloat(calculateHours(work2Form.timeIn, work2Form.timeOut));
        const otHours = parseFloat(work2Form.otHours) || 0;
        const totalHours = regularHours + otHours;
        const regularPay = regularHours * work2Config.hourlyRate;
        const otPay = otHours * work2Config.hourlyRate * 1.5;
        const totalPay = regularPay + otPay;
        
        const newEntry = {
          ...work2Form,
          id: Date.now(),
          regularHours,
          otHours,
          totalHours,
          regularPay,
          otPay,
          totalPay
        };
        
        const updated = [...work2Entries, newEntry];
        setWork2Entries(updated);
        await saveData('work2Entries', updated);
        setWork2Form({ date: '', timeIn: '', timeOut: '', otHours: 0, notes: '' });
      };
      
      const deleteWork1Entry = async (id) => {
        const updated = work1Entries.filter(e => e.id !== id);
        setWork1Entries(updated);
        await saveData('work1Entries', updated);
      };
      
      const deleteWork2Entry = async (id) => {
        const updated = work2Entries.filter(e => e.id !== id);
        setWork2Entries(updated);
        await saveData('work2Entries', updated);
      };
      
      const addBudget = async () => {
        if (!budgetForm.category || !budgetForm.monthlyLimit) return;
        const newBudget = { ...budgetForm, id: Date.now(), spent: 0 };
        const updated = [...budgets, newBudget];
        setBudgets(updated);
        await saveData('budgets', updated);
        setBudgetForm({ category: '', monthlyLimit: 0 });
      };
      
      const addExpense = async () => {
        if (!expenseForm.amount || !expenseForm.category || !expenseForm.date) return;
        
        const newExpense = { ...expenseForm, id: Date.now() };
        const updated = [...expenses, newExpense];
        setExpenses(updated);
        await saveData('expenses', updated);
        
        const expenseDate = new Date(expenseForm.date);
        const expenseMonth = String(expenseDate.getFullYear()) + '-' + String(expenseDate.getMonth() + 1).padStart(2, '0');
        
        const updatedBudgets = budgets.map(budget => {
          if (budget.category === expenseForm.category) {
            const currentMonth = String(new Date().getFullYear()) + '-' + String(new Date().getMonth() + 1).padStart(2, '0');
            if (expenseMonth === currentMonth) {
              return { ...budget, spent: (budget.spent || 0) + parseFloat(expenseForm.amount) };
            }
          }
          return budget;
        });
        setBudgets(updatedBudgets);
        await saveData('budgets', updatedBudgets);
        
        setExpenseForm({ amount: 0, category: '', date: '', description: '' });
      };
      
      const deleteExpense = async (id) => {
        const expense = expenses.find(e => e.id === id);
        if (!expense) return;
        
        const updated = expenses.filter(e => e.id !== id);
        setExpenses(updated);
        await saveData('expenses', updated);
        
        const expenseDate = new Date(expense.date);
        const expenseMonth = String(expenseDate.getFullYear()) + '-' + String(expenseDate.getMonth() + 1).padStart(2, '0');
        const currentMonth = String(new Date().getFullYear()) + '-' + String(new Date().getMonth() + 1).padStart(2, '0');
        
        if (expenseMonth === currentMonth) {
          const updatedBudgets = budgets.map(budget => {
            if (budget.category === expense.category) {
              return { ...budget, spent: Math.max(0, (budget.spent || 0) - parseFloat(expense.amount)) };
            }
            return budget;
          });
          setBudgets(updatedBudgets);
          await saveData('budgets', updatedBudgets);
        }
      };
      
      const addSalary = async () => {
        if (!salaryForm.amount || !salaryForm.date) return;
        const newSalary = { ...salaryForm, id: Date.now() };
        const updated = [...salaries, newSalary].sort((a, b) => new Date(b.date) - new Date(a.date));
        setSalaries(updated);
        await saveData('salaries', updated);
        setSalaryForm({ amount: 0, date: '', period: '', source: 'Regular', notes: '' });
      };
      
      const deleteSalary = async (id) => {
        const updated = salaries.filter(s => s.id !== id);
        setSalaries(updated);
        await saveData('salaries', updated);
      };
      
      const transferEarningsToSalary = async (workName, totalEarnings, entries) => {
        if (entries.length === 0) return;
        
        const dates = entries.map(e => new Date(e.date)).sort((a, b) => a - b);
        const startDate = dates[0].toLocaleDateString();
        const endDate = dates[dates.length - 1].toLocaleDateString();
        
        const newSalary = {
          id: Date.now(),
          amount: totalEarnings,
          date: entries[entries.length - 1].date,
          period: startDate + ' - ' + endDate,
          source: workName,
          notes: entries.length + ' work days transferred'
        };
        
        const updated = [...salaries, newSalary].sort((a, b) => new Date(b.date) - new Date(a.date));
        setSalaries(updated);
        await saveData('salaries', updated);
        alert('Earnings transferred to Salary tab!');
      };
      
      const addSavingsGoal = async () => {
        if (!goalForm.name || !goalForm.targetAmount) return;
        const newGoal = { ...goalForm, id: Date.now(), currentAmount: 0 };
        const updated = [...savingsGoals, newGoal];
        setSavingsGoals(updated);
        await saveData('savingsGoals', updated);
        setGoalForm({ name: '', targetAmount: 0, currentAmount: 0, deadline: '' });
      };
      
      const updateGoalProgress = async (id, amount) => {
        const updated = savingsGoals.map(goal =>
          goal.id === id ? { ...goal, currentAmount: parseFloat(amount) || 0 } : goal
        );
        setSavingsGoals(updated);
        await saveData('savingsGoals', updated);
      };
      
      const deleteGoal = async (id) => {
        const updated = savingsGoals.filter(g => g.id !== id);
        setSavingsGoals(updated);
        await saveData('savingsGoals', updated);
      };
      
      const generateCutoffInvoice = () => {
        const parts = cutoffMonth.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        
        let startDay, endDay;
        if (cutoffPeriod === '1') {
          startDay = 1;
          endDay = 15;
        } else {
          startDay = 16;
          const daysInMonth = new Date(year, month, 0).getDate();
          endDay = daysInMonth;
        }
        
        const startDate = new Date(year, month - 1, startDay);
        const endDate = new Date(year, month - 1, endDay);
        
        const filterEntries = (entries) => {
          return entries.filter(entry => {
            const entryDate = new Date(entry.date);
            return entryDate >= startDate && entryDate <= endDate;
          });
        };
        
        const filtered1 = filterEntries(work1Entries);
        const filtered2 = filterEntries(work2Entries);
        
        setInvoiceData({
          work1: filtered1,
          work2: filtered2,
          period: cutoffPeriod,
          month: month,
          year: year,
          startDay: startDay,
          endDay: endDay
        });
      };
      
      const downloadInvoicePDF = () => {
        window.print();
      };
      
      const copyInvoiceText = () => {
        if (!invoiceData) return;
        
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                           'July', 'August', 'September', 'October', 'November', 'December'];
        const monthName = monthNames[invoiceData.month - 1];
        
        let text = '=== WORK INVOICE ===\\n';
        text += 'Cutoff: ' + (invoiceData.period === '1' ? '1st' : '2nd') + ' Half of ' + monthName + ' ' + invoiceData.year + '\\n';
        text += 'Period: ' + invoiceData.startDay + '-' + invoiceData.endDay + ' ' + monthName + ' ' + invoiceData.year + '\\n';
        text += 'Generated: ' + new Date().toLocaleDateString() + '\\n\\n';
        
        text += '--- WORK 1 ---\\n';
        invoiceData.work1.forEach(entry => {
          text += entry.date + ' | ' + entry.timeIn + '-' + entry.timeOut + ' | ';
          text += 'Reg: ' + entry.regularHours + 'h ₱' + entry.regularPay.toFixed(2) + ' | ';
          text += 'OT: ' + entry.otHours + 'h ₱' + entry.otPay.toFixed(2) + ' | ';
          text += 'Total: ₱' + entry.totalPay.toFixed(2) + '\\n';
        });
        const work1Total = invoiceData.work1.reduce((sum, e) => sum + e.totalPay, 0);
        text += 'Work 1 Subtotal: ₱' + work1Total.toFixed(2) + '\\n\\n';
        
        text += '--- WORK 2 ---\\n';
        invoiceData.work2.forEach(entry => {
          text += entry.date + ' | ' + entry.timeIn + '-' + entry.timeOut + ' | ';
          text += 'Reg: ' + entry.regularHours + 'h ₱' + entry.regularPay.toFixed(2) + ' | ';
          text += 'OT: ' + entry.otHours + 'h ₱' + entry.otPay.toFixed(2) + ' | ';
          text += 'Total: ₱' + entry.totalPay.toFixed(2) + '\\n';
        });
        const work2Total = invoiceData.work2.reduce((sum, e) => sum + e.totalPay, 0);
        text += 'Work 2 Subtotal: ₱' + work2Total.toFixed(2) + '\\n\\n';
        
        text += '=== GRAND TOTAL: ₱' + (work1Total + work2Total).toFixed(2) + ' ===';
        
        navigator.clipboard.writeText(text);
        alert('Invoice copied to clipboard!');
      };
      
      if (loading) {
        return <div>Loading...</div>;
      }
      
      const tabs = [
        { id: 'dashboard', label: '📊 Dashboard', icon: '📊' },
        { id: 'timesheet', label: '⏰ Work Log', icon: '⏰' },
        { id: 'invoice', label: '📄 Cutoff Invoice', icon: '📄' },
        { id: 'budgets', label: '💸 Budgets', icon: '💸' },
        { id: 'reports', label: '📈 Reports', icon: '📈' },
        { id: 'salaries', label: '💰 Sahod', icon: '💰' }
      ];
      
      return (
        <div className="min-h-screen text-white p-4 md:p-8">
          <div className="max-w-7xl mx-auto">
            {/* Header */}
            <div className="text-center mb-8">
              <h1 className="text-5xl font-bold mb-2" style={{
                background: 'linear-gradient(90deg, #10b981, #06b6d4)',
                WebkitBackgroundClip: 'text',
                WebkitTextFillColor: 'transparent'
              }}>
                Finance Tracker
              </h1>
              <p className="text-slate-400">Your Complete Work & Budget Manager</p>
            </div>
            
            {/* Tabs */}
            <div className="flex overflow-x-auto gap-2 mb-6 pb-2">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={'px-6 py-3 rounded-xl font-semibold transition-all whitespace-nowrap ' +
                    (activeTab === tab.id
                      ? 'bg-emerald-500 text-white shadow-lg'
                      : 'glass-card text-slate-300 hover:bg-slate-700')}
                >
                  {tab.label}
                </button>
              ))}
            </div>
            
            {/* Dashboard Tab */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <div className="glass-card rounded-2xl p-6">
                    <div className="text-3xl mb-2">📅</div>
                    <div className="text-2xl font-bold text-emerald-400">
                      {work1Entries.length + work2Entries.length}
                    </div>
                    <div className="text-slate-400 text-sm">Work Days</div>
                  </div>
                  
                  <div className="glass-card rounded-2xl p-6">
                    <div className="text-3xl mb-2">⏰</div>
                    <div className="text-2xl font-bold text-cyan-400">
                      {(work1Entries.reduce((sum, e) => sum + e.regularHours, 0) +
                        work2Entries.reduce((sum, e) => sum + e.regularHours, 0)).toFixed(1)}h
                    </div>
                    <div className="text-slate-400 text-sm">Regular Hours</div>
                  </div>
                  
                  <div className="glass-card rounded-2xl p-6">
                    <div className="text-3xl mb-2">💰</div>
                    <div className="text-2xl font-bold text-emerald-400">
                      ₱{(work1Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         work2Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         salaries.reduce((sum, s) => sum + parseFloat(s.amount), 0)).toFixed(2)}
                    </div>
                    <div className="text-slate-400 text-sm">Total Earnings</div>
                  </div>
                  
                  <div className="glass-card rounded-2xl p-6">
                    <div className="text-3xl mb-2">💸</div>
                    <div className="text-2xl font-bold text-red-400">
                      ₱{expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0).toFixed(2)}
                    </div>
                    <div className="text-slate-400 text-sm">Total Expenses</div>
                  </div>
                </div>
                
                <div className="glass-card rounded-2xl p-6">
                  <h2 className="text-2xl font-bold text-emerald-400 mb-4">Welcome to Your Finance Tracker! 🎉</h2>
                  <p className="text-slate-300 leading-relaxed">
                    This is your complete financial management system. Track your work hours, generate invoices, 
                    manage budgets, and monitor your savings goals all in one place. Navigate through the tabs above 
                    to access different features.
                  </p>
                </div>
              </div>
            )}
            
            {/* Work Log Tab - Continuing in next part... */}
            {activeTab === 'timesheet' && (
              <div className="space-y-8">
                {/* Work 1 Section */}
                <div className="glass-card rounded-2xl p-6">
                  <h2 className="text-2xl font-bold text-emerald-400 mb-4">Work 1 Timesheet</h2>
                  <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4">
                    <input
                      type="date"
                      value={work1Form.date}
                      onChange={(e) => setWork1Form({...work1Form, date: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                    />
                    <input
                      type="time"
                      value={work1Form.timeIn}
                      onChange={(e) => setWork1Form({...work1Form, timeIn: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                      placeholder="Time In"
                    />
                    <input
                      type="time"
                      value={work1Form.timeOut}
                      onChange={(e) => setWork1Form({...work1Form, timeOut: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                      placeholder="Time Out"
                    />
                    <input
                      type="number"
                      value={work1Form.otHours}
                      onChange={(e) => setWork1Form({...work1Form, otHours: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                      placeholder="OT Hours"
                      step="0.5"
                    />
                    <button
                      onClick={addWork1Entry}
                      className="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-semibold transition"
                    >
                      + Add Entry
                    </button>
                  </div>
                  
                  {work1Form.timeIn && work1Form.timeOut && (
                    <div className="mb-4 p-4 bg-slate-700/50 rounded-lg text-sm">
                      <strong>Preview:</strong> Regular: {calculateHours(work1Form.timeIn, work1Form.timeOut)}h 
                      = ₱{(parseFloat(calculateHours(work1Form.timeIn, work1Form.timeOut)) * work1Config.hourlyRate).toFixed(2)} | 
                      OT: {work1Form.otHours}h = ₱{(parseFloat(work1Form.otHours) * work1Config.hourlyRate * 1.5).toFixed(2)} |

                        <button
                          onClick={() => deleteSalary(salary.id)}
                          className="text-red-400 hover:text-red-300"
                        >
                          🗑️
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
            
            {/* Reports Tab */}
            {activeTab === 'reports' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="glass-card rounded-2xl p-6">
                    <h3 className="text-lg font-semibold mb-2">Total Earnings</h3>
                    <div className="text-3xl font-bold text-emerald-400">
                      ₱{(work1Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         work2Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         salaries.reduce((sum, s) => sum + parseFloat(s.amount), 0)).toFixed(2)}
                    </div>
                    <div className="text-sm text-slate-400 mt-1">This month</div>
                  </div>
                  
                  <div className="glass-card rounded-2xl p-6">
                    <h3 className="text-lg font-semibold mb-2">Total Expenses</h3>
                    <div className="text-3xl font-bold text-red-400">
                      ₱{expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0).toFixed(2)}
                    </div>
                    <div className="text-sm text-slate-400 mt-1">This month</div>
                  </div>
                  
                  <div className="glass-card rounded-2xl p-6">
                    <h3 className="text-lg font-semibold mb-2">Net Savings</h3>
                    <div className="text-3xl font-bold text-cyan-400">
                      ₱{((work1Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         work2Entries.reduce((sum, e) => sum + e.totalPay, 0) +
                         salaries.reduce((sum, s) => sum + parseFloat(s.amount), 0)) -
                         expenses.reduce((sum, e) => sum + parseFloat(e.amount), 0)).toFixed(2)}
                    </div>
                    <div className="text-sm text-slate-400 mt-1">Earnings - Expenses</div>
                  </div>
                </div>
                
                <div className="glass-card rounded-2xl p-6">
                  <h2 className="text-2xl font-bold text-emerald-400 mb-4">Savings Goals</h2>
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <input
                      type="text"
                      value={goalForm.name}
                      onChange={(e) => setGoalForm({...goalForm, name: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                      placeholder="Goal Name"
                    />
                    <input
                      type="number"
                      value={goalForm.targetAmount}
                      onChange={(e) => setGoalForm({...goalForm, targetAmount: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                      placeholder="Target Amount"
                    />
                    <input
                      type="date"
                      value={goalForm.deadline}
                      onChange={(e) => setGoalForm({...goalForm, deadline: e.target.value})}
                      className="px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white"
                    />
                    <button
                      onClick={addSavingsGoal}
                      className="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-semibold transition"
                    >
                      + Add Goal
                    </button>
                  </div>
                  
                  <div className="space-y-4">
                    {savingsGoals.map(goal => {
                      const percentage = (goal.currentAmount / goal.targetAmount) * 100;
                      const isComplete = percentage >= 100;
                      
                      return (
                        <div key={goal.id} className="p-4 bg-slate-700/30 rounded-lg">
                          <div className="flex justify-between items-start mb-2">
                            <div>
                              <h3 className="font-bold text-lg">{goal.name}</h3>
                              {goal.deadline && (
                                <div className="text-sm text-slate-400">Deadline: {goal.deadline}</div>
                              )}
                            </div>
                            <button
                              onClick={() => deleteGoal(goal.id)}
                              className="text-red-400 hover:text-red-300"
                            >
                              🗑️
                            </button>
                          </div>
                          
                          <div className="flex gap-2 items-center mb-2">
                            <input
                              type="number"
                              value={goal.currentAmount}
                              onChange={(e) => updateGoalProgress(goal.id, e.target.value)}
                              className="flex-1 px-3 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white text-sm"
                              placeholder="Current amount"
                            />
                            <span className="text-slate-400">/ ₱{goal.targetAmount}</span>
                          </div>
                          
                          <div className="w-full bg-slate-700 rounded-full h-4 mb-2">
                            <div
                              className={'h-4 rounded-full transition-all ' + 
                                (isComplete ? 'bg-emerald-500' : 'bg-cyan-500')}
                              style={{width: Math.min(percentage, 100) + '%'}}
                            ></div>
                          </div>
                          
                          <div className="flex justify-between text-sm">
                            <span className={isComplete ? 'text-emerald-400 font-bold' : 'text-slate-400'}>
                              {percentage.toFixed(1)}% {isComplete && '🎉 Goal Achieved!'}
                            </span>
                            <span className="text-slate-500">
                              ₱{(goal.targetAmount - goal.currentAmount).toFixed(2)} remaining
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FinanceTracker />);
  </script>
</body>
</html>
